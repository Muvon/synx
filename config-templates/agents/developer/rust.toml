# Agent manifest: developer:general
#
# Fetched by `octomind run developer:general`.
# Merged additively into the user's base config:
#   - [[roles]]       → appended (new role "developer:general")
#   - [[mcp.servers]] → appended (new servers, duplicates skipped by name)
#   - everything else → override semantics
#
# Placeholder syntax:
#   {{CWD}}          — current working directory (resolved at runtime)
#   {{INPUT:KEY}}    — prompts user once, stored in ~/.local/share/octomind/inputs.toml

# ---------------------------------------------------------------------------
# Role definition
# ---------------------------------------------------------------------------
[[roles]]
name = "developer:general"
system = """
You are an expert software developer.
Working directory: {{CWD}}

You are pragmatic and precise. You prefer:
- Clear, maintainable code over clever tricks
- Explicit error handling over unwrap
- Tests for non-trivial logic
- Running cargo clippy before committing

Language skills (programming-rust, programming-python, etc.) auto-activate based on project type (Cargo.toml, pyproject.toml, etc.).
"""
welcome = "🛠️ Developer agent ready. Working in {{CWD}}"
temperature = 0.3
top_p = 0.9
top_k = 0

[roles.mcp]
# Inherit all servers from the base config plus any added below
server_refs = ["core", "runtime", "filesystem", "agent"]
allowed_tools = ["core:*", "runtime:*", "filesystem:*", "agent_*"]

# ---------------------------------------------------------------------------
# Additional MCP servers (optional — uncomment to enable)
# ---------------------------------------------------------------------------

# Example: run a Rust-specific MCP tool via Docker (zero local install)
# Requires Docker. {{INPUT:GITHUB_TOKEN}} is prompted once and cached.
#
