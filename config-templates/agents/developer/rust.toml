#   "--workdir", "/workspace",
#   "--env", "GITHUB_TOKEN={{INPUT:GITHUB_TOKEN}}",
#   "ghcr.io/muvon/rust-analyzer-mcp:latest"
# ]
# timeout_seconds = 60
# tools = []
