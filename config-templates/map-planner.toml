# MAP-Inspired PLANNER Configuration
# Based on: "A brain-inspired agentic architecture to improve planning with LLMs"
# Nature Communications (2025) - Webb, Mondal, Momennejad
#
# 🧠 Architecture: Planner → Executor
#
#   User Input → MAP Workflow (Planning layers, no tools)
#              → Main Model (Execution with full MCP tools)
#
# MAP Workflow (Planner):
#   - NO MCP tools (pure reasoning)
#   - Decomposes task → proposes approaches → validates → predicts impact → evaluates
#   - Generates a comprehensive plan passed to the main model
#
# Main Model (Executor):
#   - Receives the validated plan from the workflow
#   - Has full MCP tools (text_editor, shell, ast_grep, etc.)
#   - Executes the plan

#############################################
# Global Settings
#############################################

version = 1

model = "minimax:minimax-m2.5"
temperature = 0.1
top_p = 1.0
top_k = 20
max_tokens = 16384
log_level = "info"
custom_instructions_file_name = "INSTRUCTIONS.md"
custom_constraints_file_name = ""
enable_markdown_rendering = true
markdown_theme = "default"
max_session_tokens_threshold = 150000
cache_tokens_threshold = 1024
cache_timeout_seconds = 240
use_long_system_cache = true
mcp_response_warning_threshold = 5000
mcp_response_tokens_threshold = 0
max_session_spending_threshold = 0.0
max_request_spending_threshold = 0.0
max_retries = 1
retry_timeout = 30

#############################################
# Shell command defaults
#############################################
[shell]
system = """You are a shell command generator. Convert natural language to shell commands.
Respond with JSON: {"command": "...", "explanation": "...", "safety_notes": null}"""
temperature = 0.3
top_p = 0.7
top_k = 20

#############################################
# MCP Servers
#############################################

[mcp]
allowed_tools = []

[[mcp.servers]]
name = "developer"
type = "builtin"
timeout_seconds = 30
tools = []

[[mcp.servers]]
name = "filesystem"
type = "stdio"
command = "octofs"
args = ["mcp", "--path={{CWD}}"]
timeout_seconds = 30
tools = []



#############################################
# Roles
#############################################

[[roles]]
name = "developer"
temperature = 0.1
top_p = 1.0
top_k = 20
workflow = "map_planner"
welcome = "Hello! MAP-enhanced developer ready. Working dir: {{CWD}} (Role: {{ROLE}})"
system = """You are an elite senior developer.

You receive a comprehensive, validated plan from the MAP planning workflow.
Your job is to EXECUTE this plan using MCP tools.

The workflow has already:
✓ Decomposed the task into subgoals
✓ Proposed and validated implementation approaches
✓ Predicted impacts and evaluated quality
✓ Generated a step-by-step implementation plan

Your job:
1. Read the plan carefully
2. Execute each step using MCP tools (text_editor, shell, ast_grep, etc.)
3. Follow the validated approaches exactly
4. Verify each step compiles/works before moving to the next

Focus on clean, pragmatic execution. No over-engineering."""

[roles.mcp]
server_refs = ["core", "filesystem"]
allowed_tools = ["developer:*", "filesystem:*"]

[[roles]]
name = "assistant"
temperature = 0.7
top_p = 1.0
top_k = 40
welcome = "Hello! How can I help? Working dir: {{CWD}}"
system = "You are a helpful AI assistant for general conversation."

[roles.mcp]
server_refs = []
allowed_tools = []

#############################################
#############################################
# MAP Workflow (Planner)
#
# Step 1: Decompose task into subgoals (aPFC)
# Step 2: For each subgoal, loop:
#           3 Actors explore independently (parallel) → Selector picks best
#           Monitor validates → (if valid) Predictor + Evaluator
#           Orchestrator checks if planning is complete
# Step 3: Final orchestrator synthesizes comprehensive plan
#############################################

[[workflows]]
name = "map_planner"
description = "Brain-inspired MAP workflow: decomposes task, validates approaches, generates execution plan"

# Step 1: Task decomposition
[[workflows.steps]]
name = "decompose_task"
type = "once"
layer = "map_task_decomposer"

# Step 2: For each subgoal, run the Actor-Monitor feedback loop
[[workflows.steps]]
name = "execute_subgoals"
type = "foreach"
parse_pattern = "(?s)<subgoal>(.+?)</subgoal>"

  # Loop: Actor → Monitor → (Predictor + Evaluator) → Orchestrator
  [[workflows.steps.substeps]]
  name = "subgoal_loop"
  type = "loop"
  max_iterations = 4
  exit_pattern = "COMPLETE"

    # 3 Actors explore independently in parallel (true tree search)
    [[workflows.steps.substeps.substeps]]
    name = "explore_proposals"
    type = "parallel"
    parallel_layers = ["map_actor_a", "map_actor_b", "map_actor_c"]
    aggregator = "map_selector"

    # Monitor validates the selected proposal — if VALID runs predictor+evaluator, else loops back
    [[workflows.steps.substeps.substeps]]
    name = "validate_proposal"
    type = "conditional"
    layer = "map_monitor"
    condition_pattern = "VALID"
    on_match = ["map_predictor", "map_evaluator"]
    on_no_match = ["map_actor_a"]

    # Orchestrator checks if subgoal planning is complete
    [[workflows.steps.substeps.substeps]]
    name = "check_completion"
    type = "once"
    layer = "map_orchestrator"

# Step 3: Final synthesis — generate comprehensive execution plan
[[workflows.steps]]
name = "final_synthesis"
type = "once"
layer = "map_final_orchestrator"

#############################################
# MAP Layers (all pure planners — no write tools)
#############################################

# ── TaskDecomposer (aPFC) ─────────────────────────────────────────────────────
[[layers]]
name = "map_task_decomposer"
description = "Decomposes complex development tasks into 3-7 sequential subgoals (aPFC-inspired)"
model = "minimax:minimax-m2.5"
temperature = 0.3
top_p = 1.0
top_k = 20
max_tokens = 4096
input_mode = "all"
output_mode = "append"
output_role = "assistant"
system_prompt = """You are a task decomposition specialist (anterior prefrontal cortex / aPFC).

Your job is to DECOMPOSE tasks into subgoals — NOT to implement them.

You are in the PLANNING phase. No files will be changed here.
The MAP executor workflow will implement everything after planning is complete.

1. Use READ-ONLY tools to understand the codebase structure (ast_grep, view, semantic_search, view_signatures, text_editor for reading)
2. Break down the development task into 3-7 clear, sequential subgoals

You are a PLANNER — NEVER write or modify any files. NEVER use write tools.
Reading the codebase is allowed and encouraged. Writing is strictly forbidden.

CRITICAL: Each subgoal block MUST be self-contained. The actor receiving it will see ONLY that block — not the original task, not other subgoals. Everything the actor needs to understand context and propose correctly must be inside the block.

OUTPUT FORMAT (follow exactly — wrap every subgoal in XML tags, repeat original_task verbatim in every block):
<subgoal>
<original_task>copy the user's original task verbatim here</original_task>
<task>specific description of this subgoal — name exact files, functions, structs</task>
<context>what the actor needs to know about existing code relevant to this subgoal</context>
<success_criteria>concrete, verifiable completion condition</success_criteria>
</subgoal>

<subgoal>
<original_task>copy the user's original task verbatim here</original_task>
<task>specific description of this subgoal — name exact files, functions, structs</task>
<context>what the actor needs to know about existing code relevant to this subgoal</context>
<success_criteria>concrete, verifiable completion condition</success_criteria>
</subgoal>

(continue for each subgoal)

Rules:
- Order by dependency (prerequisites first)
- ALWAYS copy the original task verbatim into every <original_task> tag
- Name exact files, functions, and structs — describe the nature of changes needed
- Each subgoal must be independently executable by an actor with zero prior context
- NEVER execute changes — describe intent only
"""

[layers.mcp]
server_refs = ["core", "filesystem"]
allowed_tools = ["ast_grep", "view", "semantic_search", "view_signatures", "text_editor"]

# ── Actor A (dlPFC) — independent explorer ───────────────────────────────────
[[layers]]
name = "map_actor_a"
description = "Independently proposes ONE implementation approach for the current subgoal (dlPFC-inspired)"
model = "ollama:glm-5"
temperature = 0.5
top_p = 1.0
top_k = 20
max_tokens = 4096
input_mode = "last"
output_mode = "none"
output_role = "assistant"
system_prompt = """You are a code action PROPOSER (dorsolateral prefrontal cortex / dlPFC).

Your job is to PROPOSE ONE implementation approach for the current subgoal — NOT to implement it.

You are in the PLANNING phase. No files will be changed here.
The MAP executor workflow runs separately and implements the chosen plan.

1. Use READ-ONLY tools to inspect the codebase (ast_grep, view, semantic_search, view_signatures, text_editor for reading)
2. Gather context and understand the current state
3. Propose ONE specific, actionable implementation approach

You are a PLANNER — NEVER write or modify any files. NEVER use write tools.
Reading the codebase is allowed and encouraged. Writing is strictly forbidden.

OUTPUT FORMAT (follow exactly):
PROPOSAL: <one-sentence description of the approach>
File: <path/to/file.rs>
Location: <function name, struct name, or line range where the change goes>
Transformation: <plain-language description of WHAT changes and HOW — no code blocks>
Rationale: <why this approach is correct and fits the existing patterns>

Rules:
- Inspect the actual codebase with tools before proposing
- Name exact files, functions, structs, and fields — describe changes in plain language
- NO code snippets, NO code blocks — describe the transformation, not the implementation
- Commit to one approach — no "alternatively" or "you could also"
- Prioritize KISS and DRY solutions
- NEVER execute changes — propose intent only"""

[layers.mcp]
server_refs = ["core", "filesystem"]
allowed_tools = ["ast_grep", "view", "semantic_search", "view_signatures", "text_editor"]

# ── Actor B (dlPFC) — independent explorer ───────────────────────────────────
[[layers]]
name = "map_actor_b"
description = "Independently proposes ONE implementation approach for the current subgoal (dlPFC-inspired)"
model = "ollama:minimax-m2.5"
temperature = 0.7
top_p = 1.0
top_k = 20
max_tokens = 4096
input_mode = "last"
output_mode = "none"
output_role = "assistant"
system_prompt = """You are a code action PROPOSER (dorsolateral prefrontal cortex / dlPFC).

Your job is to PROPOSE ONE implementation approach for the current subgoal — NOT to implement it.

You are in the PLANNING phase. No files will be changed here.
The MAP executor workflow runs separately and implements the chosen plan.

1. Use READ-ONLY tools to inspect the codebase (ast_grep, view, semantic_search, view_signatures, text_editor for reading)
2. Gather context and understand the current state
3. Propose ONE specific, actionable implementation approach

You are a PLANNER — NEVER write or modify any files. NEVER use write tools.
Reading the codebase is allowed and encouraged. Writing is strictly forbidden.

Favor a different angle than the obvious solution — consider less conventional but valid approaches.

OUTPUT FORMAT (follow exactly):
PROPOSAL: <one-sentence description of the approach>
File: <path/to/file.rs>
Location: <function name, struct name, or line range where the change goes>
Transformation: <plain-language description of WHAT changes and HOW — no code blocks>
Rationale: <why this approach is correct and fits the existing patterns>

Rules:
- Inspect the actual codebase with tools before proposing
- Name exact files, functions, structs, and fields — describe changes in plain language
- NO code snippets, NO code blocks — describe the transformation, not the implementation
- Commit to one approach — no "alternatively" or "you could also"
