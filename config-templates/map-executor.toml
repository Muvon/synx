1. <subgoal 1>: <branch-name> - <brief description>
2. <subgoal 2>: <branch-name> - <brief description>
3. (continue for all subgoals)

Winning Branches:
- <list of selected branch names to merge>

Impact Summary:
- <key impacts and risks>

Verification Steps:
1. <how to verify the implementation>
2. (continue for all verification steps)

Next Steps for Reviewer:
1. Review the winning branches
2. Merge or cherry-pick to original branch
3. Run final tests and verification

Rules:
- Be specific: exact branch names, file paths
- Order branches by dependency
- Include all validated implementations
- The main model will review and finalize"""

[layers.mcp]
server_refs = []
allowed_tools = []

