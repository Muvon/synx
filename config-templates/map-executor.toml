# MAP-Inspired EXECUTOR Configuration
# Based on: "A brain-inspired agentic architecture to improve planning with LLMs"
# Nature Communications (2025) - Webb, Mondal, Momennejad
#
# 🧠 Architecture: Planner → Executor (with branch isolation)
#
#   User Input → MAP Workflow (Actors execute in isolated branches)
#              → Main Model (Reviews and merges best implementation)
#
# MAP Workflow (Executor):
#   - Each Actor creates its OWN branch, implements solution
#   - Original branch stays UNTOUCHED during execution
#   - Selector compares patches/diffs from all branches
#   - Monitor validates the selected implementation
#   - Final orchestrator reports the winning branch
#
# Main Model (Reviewer):
#   - Reviews the selected implementation
#   - Can merge, cherry-pick, or request changes
#   - Has full MCP tools for final adjustments

#############################################
# Global Settings
#############################################

version = 1

model = "minimax:minimax-m2.5"
temperature = 0.1
top_p = 1.0
top_k = 20
max_tokens = 16384
log_level = "info"
custom_instructions_file_name = "INSTRUCTIONS.md"
custom_constraints_file_name = ""
enable_markdown_rendering = true
markdown_theme = "default"
max_session_tokens_threshold = 150000
cache_tokens_threshold = 1024
cache_timeout_seconds = 240
use_long_system_cache = true
mcp_response_warning_threshold = 5000
mcp_response_tokens_threshold = 0
max_session_spending_threshold = 0.0
max_request_spending_threshold = 0.0
max_retries = 1
retry_timeout = 30

#############################################
# Shell command defaults
#############################################
[shell]
system = """You are a shell command generator. Convert natural language to shell commands.
Respond with JSON: {"command": "...", "explanation": "...", "safety_notes": null}"""
temperature = 0.3
top_p = 0.7
top_k = 20

#############################################
# MCP Servers
#############################################

[mcp]
allowed_tools = []

[[mcp.servers]]
name = "developer"
type = "builtin"
timeout_seconds = 30
tools = []

[[mcp.servers]]
name = "filesystem"
type = "builtin"
timeout_seconds = 30
tools = []



#############################################
# Roles
#############################################

[[roles]]
name = "developer"
temperature = 0.1
top_p = 1.0
top_k = 20
workflow = "map_executor"
welcome = "Hello! MAP-enhanced executor ready. Working dir: {{CWD}} (Role: {{ROLE}})"
system = """You are an elite senior code reviewer.

You receive the winning implementations from the MAP execution workflow.
Your job is to REVIEW and FINALIZE the implementations.

The workflow has already:
✓ Decomposed the task into subgoals
✓ Had 3 actors implement solutions in isolated worktrees
✓ Selected the best implementation via patch comparison
✓ Validated and evaluated the solution

Your job:
1. Review the selected worktree implementations
2. Check for quality, correctness, and completeness
3. Merge or cherry-pick to the original branch if approved
4. Make any final adjustments if needed
5. Clean up worktrees: git worktree remove <worktree-path>
6. Report the final status

You have full MCP tools available. Focus on clean, pragmatic review."""

[roles.mcp]
server_refs = ["core", "filesystem"]
allowed_tools = ["developer:*", "filesystem:*"]
[[roles]]
name = "assistant"
temperature = 0.7
top_p = 1.0
top_k = 40
welcome = "Hello! How can I help? Working dir: {{CWD}}"
system = "You are a helpful AI assistant for general conversation."

[roles.mcp]
server_refs = []
allowed_tools = []

#############################################
# MAP Workflow (Executor with branch isolation)
#
# Step 1: Decompose task into subgoals (aPFC)
# Step 2: For each subgoal, loop:
#           3 Actors execute independently in isolated branches (parallel)
#           Selector compares patches and picks best
#           Monitor validates → (if valid) Predictor + Evaluator
#           Orchestrator checks if execution is complete
# Step 3: Final orchestrator reports winning branch
#############################################

[[workflows]]
name = "map_executor"
description = "Brain-inspired MAP workflow: actors execute in isolated branches, selector picks best implementation"

# Step 1: Task decomposition (read-only)
[[workflows.steps]]
name = "decompose_task"
type = "once"
layer = "map_task_decomposer"

# Step 2: For each subgoal, run the Actor-Monitor feedback loop
[[workflows.steps]]
name = "execute_subgoals"
type = "foreach"
parse_pattern = "(?s)<subgoal>(.+?)</subgoal>"

  # Loop: Actor → Selector → Monitor → (Predictor + Evaluator) → Orchestrator
  [[workflows.steps.substeps]]
  name = "subgoal_loop"
  type = "loop"
  max_iterations = 4
  exit_pattern = "COMPLETE"

    # 3 Actors execute independently in isolated branches (parallel)
    [[workflows.steps.substeps.substeps]]
    name = "execute_in_branches"
    type = "parallel"
    parallel_layers = ["map_actor_a", "map_actor_b", "map_actor_c"]
    aggregator = "map_selector"

    # Monitor validates the selected implementation
    [[workflows.steps.substeps.substeps]]
    name = "validate_implementation"
    type = "conditional"
    layer = "map_monitor"
    condition_pattern = "VALID"
    on_match = ["map_predictor", "map_evaluator"]
    on_no_match = ["map_actor_a"]

    # Orchestrator checks if subgoal execution is complete
    [[workflows.steps.substeps.substeps]]
    name = "check_completion"
    type = "once"
    layer = "map_orchestrator"

# Step 3: Final synthesis — report winning branch
[[workflows.steps]]
name = "final_synthesis"
type = "once"
layer = "map_final_orchestrator"

#############################################
# MAP Layers
#############################################

# ── TaskDecomposer (aPFC) — READ-ONLY ───────────────────────────────────────────
[[layers]]
name = "map_task_decomposer"
description = "Decomposes complex development tasks into 3-7 sequential subgoals (aPFC-inspired)"
model = "minimax:minimax-m2.5"
temperature = 0.3
top_p = 1.0
top_k = 20
max_tokens = 4096
input_mode = "all"
output_mode = "append"
output_role = "assistant"
system_prompt = """You are a task decomposition specialist (anterior prefrontal cortex / aPFC).

Your job is to DECOMPOSE tasks into subgoals — NOT to implement them.

1. Use READ-ONLY tools to understand the codebase structure:
   - semantic_search, ast_grep, view, view_signatures — for code discovery
   - text_editor (view only) — to read specific files and line ranges
2. Break down the development task into 3-7 clear, sequential subgoals

You are a PLANNER — do NOT write or modify any files.
The actors will execute each subgoal in isolated worktrees.

CRITICAL: Each subgoal block MUST be self-contained. The actor receiving it will see ONLY that block — not the original task, not other subgoals. Everything the actor needs to understand context and implement correctly must be inside the block.

OUTPUT FORMAT (follow exactly — wrap every subgoal in XML tags, repeat original_task verbatim in every block):
<subgoal>
<original_task>copy the user's original task verbatim here</original_task>
<task>specific description of this subgoal — name exact files, functions, structs</task>
<context>what the actor needs to know about existing code relevant to this subgoal</context>
<success_criteria>concrete, verifiable completion condition</success_criteria>
</subgoal>

<subgoal>
<original_task>copy the user's original task verbatim here</original_task>
<task>specific description of this subgoal — name exact files, functions, structs</task>
<context>what the actor needs to know about existing code relevant to this subgoal</context>
<success_criteria>concrete, verifiable completion condition</success_criteria>
</subgoal>

(continue for each subgoal)

Rules:
- Order by dependency (prerequisites first)
- ALWAYS copy the original task verbatim into every <original_task> tag
- Be specific: name files, functions, and exact changes needed
- Each subgoal must be independently executable by an actor with zero prior context
- DO NOT execute changes — only plan them"""

[layers.mcp]
server_refs = ["core", "filesystem"]
allowed_tools = ["semantic_search", "ast_grep", "view", "view_signatures", "text_editor"]

# ── Actor A (dlPFC) — EXECUTOR with worktree isolation ────────────────────────────
[[layers]]
name = "map_actor_a"
description = "Executes implementation in isolated worktree (dlPFC-inspired)"
model = "ollama:glm-5"
temperature = 0.5
top_p = 1.0
top_k = 20
max_tokens = 8192
input_mode = "last"
output_mode = "none"
output_role = "assistant"
system_prompt = """You are a code executor (dorsolateral prefrontal cortex / dlPFC).

Your ONLY job is to IMPLEMENT — not plan, not propose, not analyze. Write code NOW.

DO NOT write proposals, analysis, or descriptions. USE YOUR TOOLS IMMEDIATELY.

EXECUTION PROTOCOL — follow these steps in order, using tools at each step:

STEP 1 — Capture context (run shell commands):
  shell: ORIG_DIR=$(pwd) && echo $ORIG_DIR
  shell: git branch --show-current

STEP 2 — Create isolated worktree (run shell commands):
  shell: TS=$(date +%s) && PROJECT=$(basename $(git rev-parse --show-toplevel)) && git worktree add /tmp/$PROJECT-map-actor-a-$TS -b map-actor-a-$TS && echo "WORKTREE=/tmp/$PROJECT-map-actor-a-$TS"
  workdir: switch to the worktree path printed above

STEP 3 — Explore and implement (use tools to read then write):
  - Read: semantic_search, ast_grep, view, view_signatures, text_editor (view)
  - Write: text_editor (create/str_replace/line_replace), batch_edit, extract_lines
  - Verify: shell (cargo check, cargo clippy, tests)

STEP 4 — Commit:
  shell: git add -A && git commit -m "map-actor-a: <brief description>"

STEP 5 — Return to original dir:
  workdir: switch back to ORIG_DIR

STEP 6 — Output ONLY this (no other text):
WORKTREE: <worktree-path>
BRANCH: <branch-name>
IMPLEMENTATION: <one line>
FILES_CHANGED: <list>
VERIFICATION: <cargo check result>

Rules:
- START with shell tools immediately — no preamble
- NEVER write proposals or analysis — implement directly
- NEVER modify the original directory
- Prioritize KISS and DRY"""

[layers.mcp]
server_refs = ["core", "filesystem"]
allowed_tools = ["shell", "ast_grep", "view", "semantic_search", "view_signatures", "text_editor", "batch_edit", "extract_lines", "workdir"]

