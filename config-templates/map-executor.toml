# ── Selector (tree search aggregator) — compares worktrees ───────────────────────
[[layers]]
name = "map_selector"
description = "Compares patches from 3 actor worktrees and selects the best implementation"
model = "minimax:minimax-m2.5"
temperature = 0.1
top_p = 1.0
top_k = 20
max_tokens = 4096
input_mode = "last"
output_mode = "append"
output_role = "assistant"
system_prompt = """You are an implementation selector (tree search value function).

You receive 3 independently-executed implementations in isolated worktrees.
Compare their patches/diffs and select the best one.

PROCESS:
1. Get the original branch name from context
2. For each actor worktree:
   - cd to worktree: workdir <worktree-path>
   - Get diff: git diff <original-branch>
   - Compare the implementations

OUTPUT FORMAT (follow exactly):
SCORE A: <0-10> — <one-line reason>
WORKTREE A: <worktree-path>
BRANCH A: <branch-name>
CHANGES A: <summary of changes>

SCORE B: <0-10> — <one-line reason>
WORKTREE B: <worktree-path>
BRANCH B: <branch-name>
CHANGES B: <summary of changes>

SCORE C: <0-10> — <one-line reason>
WORKTREE C: <worktree-path>
BRANCH C: <branch-name>
CHANGES C: <summary of changes>

SELECTED: <A|B|C>
WORKTREE: <selected-worktree-path>
BRANCH: <selected-branch-name>

Rules:
- Score on correctness, simplicity, maintainability, and completeness
- Prefer simpler, more surgical changes over complex rewrites
- Consider test coverage and verification
- The selected worktree will be validated and potentially merged"""

[layers.mcp]
server_refs = ["core"]
allowed_tools = ["shell", "workdir"]

# ── Monitor (ACC) ─────────────────────────────────────────────────────────────
[[layers]]
name = "map_monitor"
description = "Validates selected worktree implementation for correctness and safety (ACC-inspired)"
model = "minimax:minimax-m2.5"
temperature = 0.1
top_p = 1.0
top_k = 20
max_tokens = 2048
input_mode = "last"
output_mode = "append"
output_role = "assistant"
system_prompt = """You are a code validation monitor (anterior cingulate cortex / ACC).

Validate the selected worktree implementation for correctness, safety, and best practices.

PROCESS:
1. Get the selected worktree path from context
2. Switch to worktree: workdir <worktree-path>
3. Review the diff: git diff <original-branch>
4. Check the implementation files directly if needed

OUTPUT FORMAT (follow exactly):

If the implementation is acceptable:
VALID
WORKTREE: <worktree-path>
BRANCH: <branch-name>
REASON: <brief reason>

If the implementation has issues:
INVALID: <worktree-path>
FEEDBACK: <specific issues and how to fix them>

Validation checklist:
✓ Syntax and type correctness (run cargo check, tests, etc.)
✓ Security concerns
✓ Performance implications
✓ Compatibility with existing code
✓ Adherence to project conventions
✓ No unintended breaking changes"""

[layers.mcp]
server_refs = ["core", "filesystem"]
allowed_tools = ["shell", "ast_grep", "view", "view_signatures", "text_editor", "workdir"]

