name: CI

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@1.95.0
      with:
        components: rustfmt, clippy

    - name: Setup protoc
      uses: arduino/setup-protoc@v3
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Install ripgrep and ast-grep
      run: |
        cargo install ripgrep --locked
        cargo install ast-grep --locked

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Run cargo check
      run: cargo check --all-targets --all-features

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@1.95.0
      with:
        components: rustfmt

    - name: Run cargo fmt
      run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@1.95.0
      with:
        components: clippy

    - name: Setup protoc
      uses: arduino/setup-protoc@v3
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Install ripgrep and ast-grep
      run: |
        cargo install ripgrep --locked
        cargo install ast-grep --locked


    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Run cargo clippy
      run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test Suite
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        rust: [1.95.0]
        include:
          - os: ubuntu-latest
            rust: beta
          - os: ubuntu-latest
            rust: nightly
    continue-on-error: ${{ matrix.rust == 'nightly' }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ matrix.rust }}

    - name: Setup protoc
      uses: arduino/setup-protoc@v3
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Install ripgrep and ast-grep
      run: |
        cargo install ripgrep --locked
        cargo install ast-grep --locked

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-${{ matrix.rust }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-${{ matrix.rust }}-cargo-
          ${{ runner.os }}-cargo-

    - name: Download ONNX Runtime static library (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        ORT_VERSION="1.24.2"
        ORT_ASSET="onnxruntime-linux-x64-static_lib-${ORT_VERSION}-glibc2_17"
        curl -sL "https://github.com/csukuangfj/onnxruntime-libs/releases/download/v${ORT_VERSION}/${ORT_ASSET}.zip" -o /tmp/ort.zip
        unzip -q /tmp/ort.zip -d /tmp/ort
        echo "ORT_LIB_LOCATION=/tmp/ort/${ORT_ASSET}/lib" >> "$GITHUB_ENV"

    - name: Download ONNX Runtime static library (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $ORT_VERSION = "1.24.2"
        $ORT_ASSET = "onnxruntime-win-x64-static_lib-MD-Release-$ORT_VERSION"
        $ORT_DIR = "C:\ort"
        New-Item -ItemType Directory -Force -Path $ORT_DIR | Out-Null
        Invoke-WebRequest -Uri "https://github.com/csukuangfj/onnxruntime-libs/releases/download/v$ORT_VERSION/$ORT_ASSET.tar.bz2" -OutFile "$ORT_DIR\ort.tar.bz2"
        tar -xjf "$ORT_DIR\ort.tar.bz2" -C $ORT_DIR
        echo "ORT_LIB_LOCATION=$ORT_DIR\$ORT_ASSET\lib" >> $env:GITHUB_ENV

    - name: Run tests
      shell: bash
      run: cargo test --verbose

  musl-build:
    name: Musl Build (x86_64 + aarch64)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-22.04-arm
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # Cache the static ONNX Runtime build (45–60 min cold) between runs.
    # Keyed by ORT version + target so a version bump invalidates correctly.
    - name: Cache ONNX Runtime static build
      uses: actions/cache@v4
      with:
        path: onnxruntime-static
        key: onnxruntime-1.24.2-${{ matrix.target }}-alpine3.23-v2

    - name: Cache cargo registry and target
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: docker-alpine-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          docker-alpine-${{ matrix.target }}-cargo-

    - name: Build in Alpine (mirrors release pipeline)
      run: |
        mkdir -p onnxruntime-static/lib
        chmod -R 777 onnxruntime-static

        docker run --rm \
          --user 0:0 \
          -v "$(pwd):/workspace" \
          -w /workspace \
          rust:1.95.0-alpine3.23 \
          sh -c '
            set -eu
            apk add --no-cache \
              git perl bash musl-dev openssl-dev openssl-libs-static \
              pkgconfig gcc g++ protobuf-dev \
              cmake make linux-headers python3 py3-pip patch

            # Provide stub execinfo.h — musl lacks it and Alpine 3.17+ removed
            # libexecinfo. ORT'\''s stacktrace.cc unconditionally includes it on
            # non-Android POSIX. The stub provides no-op backtrace functions.
            mkdir -p /tmp/include
            cat > /tmp/include/execinfo.h << "EOF"
        #ifndef _EXECINFO_H
        #define _EXECINFO_H
        #include <stddef.h>
        static inline int backtrace(void **buffer, int size) { (void)buffer; (void)size; return 0; }
        static inline char **backtrace_symbols(void *const *buffer, int size) { (void)buffer; (void)size; return NULL; }
        static inline void backtrace_symbols_fd(void *const *buffer, int size, int fd) { (void)buffer; (void)size; (void)fd; }
        #endif
        EOF
            export C_INCLUDE_PATH=/tmp/include
            export CPLUS_INCLUDE_PATH=/tmp/include

            rustup target add ${{ matrix.target }}

            ORT_LIB_LOCATION="/workspace/onnxruntime-static/lib"
            if [ ! -f "$ORT_LIB_LOCATION/libonnxruntime.a" ]; then
              echo "==> Building ONNX Runtime 1.24.2 from source (static, musl)"
              rm -rf /tmp/onnxruntime
              git clone --single-branch --branch v1.24.2 --recursive \
                https://github.com/microsoft/onnxruntime.git /tmp/onnxruntime
              cd /tmp/onnxruntime
              ./build.sh \
                --config Release \
                --build_dir build \
                --parallel \
                --skip_tests \
                --skip_submodule_sync \
                --allow_running_as_root \
                --compile_no_warning_as_error \
                --no_kleidiai \
                --no_sve \
                --cmake_extra_defines \
                  CMAKE_POSITION_INDEPENDENT_CODE=ON \
                  onnxruntime_BUILD_UNIT_TESTS=OFF \
                  onnxruntime_BUILD_SHARED_LIB=OFF \
                  onnxruntime_USE_KLEIDIAI=OFF
              find build/Release -name "*.a" -exec cp -v {} "$ORT_LIB_LOCATION/" \;
              cd /workspace
              rm -rf /tmp/onnxruntime
            else
              echo "==> Using cached ONNX Runtime static build"
            fi

            export ORT_LIB_LOCATION="$ORT_LIB_LOCATION"
            cargo build --target ${{ matrix.target }}
          '

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@1.95.0

    - name: Setup protoc
      uses: arduino/setup-protoc@v3
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Install ripgrep and ast-grep
      run: |
        cargo install ripgrep --locked
        cargo install ast-grep --locked

    - name: Install cargo-audit
      run: cargo install cargo-audit --locked

    - name: Run security audit
      run: cargo audit

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@1.95.0

    - name: Setup protoc
      uses: arduino/setup-protoc@v3
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Install ripgrep and ast-grep
      run: |
        cargo install ripgrep --locked
        cargo install ast-grep --locked

    - name: Install cargo-tarpaulin
      run: cargo install cargo-tarpaulin --locked

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-coverage-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-coverage-
          ${{ runner.os }}-cargo-

    - name: Generate code coverage
      run: cargo tarpaulin --verbose --workspace --timeout 120 --out xml

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./cobertura.xml
        fail_ci_if_error: false

  brief:
    name: PR Brief
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Generate PR Brief (New PR)
      if: github.event.action == 'opened'
      uses: muvon/octomind-action@master
      with:
        role: developer:brief
        model: ollama:glm-5.1
        prompt: "Compare branch '${{ github.head_ref }}' to '${{ github.base_ref }}' and provide a brief summary of all changes"
        comment: 'full'
      env:
        OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}

    - name: Generate PR Brief (Push to existing PR)
      if: github.event.action == 'synchronize'
      uses: muvon/octomind-action@master
      with:
        role: developer:brief
        model: ollama:glm-5.1
        prompt: "Analyze changes from commit ${{ github.event.before }} to ${{ github.event.after }} and provide a brief summary of incremental changes"
        comment: 'full'
      env:
        OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
