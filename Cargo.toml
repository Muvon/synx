[package]
name = "synx"
version = "0.1.0"
edition = "2021"
description = "Fast, real-time bidirectional file sync over SSH"
license = "MIT OR Apache-2.0"
authors = ["Muvon"]
readme = "README.md"

[[bin]]
name = "synx"
path = "src/main.rs"

[dependencies]
anyhow = "1.0"
blake3 = "1.5"
bincode = "1.3"
clap = { version = "4.5", features = ["derive"] }
dirs = "5"
filetime = "0.2"
humansize = "2.1"
ignore = "0.4"
notify = "6.1"
notify-debouncer-full = "0.3"
owo-colors = "4.0"
serde = { version = "1.0", features = ["derive"] }
tokio = { version = "1.36", features = ["rt-multi-thread", "macros", "io-util", "io-std", "fs", "process", "sync", "time", "signal"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
zstd = "0.13"

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
strip = true
panic = "abort"
