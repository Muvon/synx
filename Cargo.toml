[package]
name = "octomind"
version = "0.11.0"
edition = "2021"
authors = ["Muvon Un Limited <contact@muvon.io>"]
license = "Apache-2.0"
description = "Session-based AI development assistant with conversational codebase interaction, multimodal vision support, built-in MCP tools, and multi-provider AI integration"
homepage = "https://octomind.muvon.io"
repository = "https://github.com/muvon/octomind"
documentation = "https://octomind.muvon.io"
keywords = ["ai", "development", "assistant", "productivity", "conversational"]
categories = ["development-tools", "command-line-utilities"]
readme = "README.md"
rust-version = "1.82"
exclude = [
    "tests/fixtures/*",
    "examples/*",
    ".github/*",
    "docs/*",
    "scripts/*",
    "*.md",
    "install.sh"
]

# Enable static linking
[profile.release]
lto = true        # Enable Link Time Optimization
codegen-units = 1 # Reduce parallel code generation units for better optimization
panic = "abort"  # Abort on panic for smaller binary size
strip = true      # Strip symbols from binary

[dependencies]
tokio = { version = "1.45.1", features = ["rt-multi-thread", "macros", "time", "process", "fs", "sync", "signal"] }
crossterm = "0.29.0"
indicatif = "0.17.11"
parking_lot = "0.12.4"
chrono = { version = "0.4.41", features = ["serde"] }
serde = { version = "1.0.219", features = ["derive"] }
uuid = { version = "1.17.0", features = ["v4"] }
tiktoken-rs = "0.7.0" # Token counter
reqwest = { version = "0.12.18", features = ["json", "rustls-tls", "gzip"], default-features = false }
anyhow = "1.0.98"
serde_json = "1.0.140"
clap = { version = "4.5.39", features = ["derive"] }
clap_complete = "4.5.39"
toml = "0.8.22"
lazy_static = "1.5.0"
tokio-util = { version = "0.7", features = ["rt"] }
rustyline = { version = "16.0.0", features = ["custom-bindings"] }
regex = "1.11.1"
colored = "3.0.0"
async-trait = "0.1.88"
termimad = "0.33.0"
syntect = "5.2.0"
html5ever = "0.33.0"
markup5ever_rcdom = "0.5.3-unofficial"
url = "2.5.4"
dirs = "6.0.0"
glob = "0.3.2"
ignore = "0.4.23"
futures = "0.3.31"
dotenvy = "0.15.7"
arboard = "3.4.1"
image = { version = "0.25.6", default-features = false, features = ["png", "jpeg", "gif", "webp", "bmp"] }
viuer = "0.9.1"
base64 = "0.22"
urlencoding = "2.1.3"
humantime-serde = "1.1.1"

[dev-dependencies]
tempfile = "3.14.0"
serial_test = "3.2.0"

[profile.dev]
opt-level = 1          # Basic optimizations without slowing compilation too much
debug = true           # Keep debug symbols for backtraces
debug-assertions = true # Keep runtime checks
overflow-checks = true  # Keep overflow checks
lto = false            # Disable Link Time Optimization to speed up builds
codegen-units = 256    # Use more codegen units for faster parallel compilation
incremental = true     # Enable incremental compilation
rpath = false          # Disable runtime search path
